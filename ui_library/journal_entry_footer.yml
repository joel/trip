description: >
  Collapsed footer for JournalEntryCard. Left side shows up to 3 reaction
  emoji pills with a total count, plus a comment count label. Right side
  renders a "Read more" / "Collapse" toggle button with a rotating chevron
  that triggers the feed-entry Stimulus controller. Separated from card
  body by a top border.
stimulus_controller: feed-entry (action target, not controller host)
