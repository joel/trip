  - flex, items-center, justify-between, gap-2, gap-3
  - border-t, border-[var(--ha-surface-high)]
  - text-xs, text-sm, font-semibold
  - inline-flex, inline-block
  - cursor-pointer
  - hover:gap-2
  - transition-all, transition-transform, duration-200
