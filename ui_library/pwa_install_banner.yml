description: >
  Fixed-position PWA install prompt with download icon, title, description,
  install button, iOS instructions, and dismiss. Uses sky-blue gradient
  matching FlashToasts pattern. Shown by Stimulus controller after 2+ page
  visits. Includes opacity/transform entrance animation.
