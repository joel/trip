        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .tonal-sculpting {
            background: linear-gradient(180deg, rgba(255,255,255,0) 0%, rgba(242,243,255,1) 100%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body text-on-background min-h-screen flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-white/70 dark:bg-slate-900/70 backdrop-blur-xl flex justify-between items-center px-6 h-16 w-full shadow-[0_20px_40px_-12px_rgba(19,27,46,0.08)]">
<div class="flex items-center gap-4">
<button class="text-sky-500 dark:text-sky-400 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-all duration-300 p-2 rounded-full scale-95 active:scale-90">
<span class="material-symbols-outlined" data-icon="menu">menu</span>
</button>
<h1 class="font-['Space_Grotesk'] font-bold tracking-tight text-xl text-slate-900 dark:text-slate-50">Catalyst Glass</h1>
</div>
<button class="text-sky-500 dark:text-sky-400 hover:bg-slate-100/50 dark:hover:bg-slate-800/50 transition-all duration-300 p-2 rounded-full scale-95 active:scale-90">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</header>
<!-- Main Content Area -->
<main class="flex-grow pt-24 pb-32 px-6 flex flex-col items-center justify-center relative overflow-hidden">
<!-- Background Aura Decoration -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 h-80 bg-primary/10 rounded-full blur-[100px] pointer-events-none"></div>
<!-- Header Content -->
<div class="w-full max-w-md mb-12 text-left">
<span class="font-label text-xs font-bold tracking-[0.2em] text-primary uppercase block mb-1">ACTIVITY</span>
<h2 class="font-headline text-4xl font-bold tracking-tight text-on-surface">Notifications</h2>
</div>
<!-- Empty State Component (Bento-style Minimal Card) -->
<div class="w-full max-w-sm flex flex-col items-center justify-center space-y-8 py-16 px-8 rounded-lg bg-surface-container-lowest/40 backdrop-blur-md border border-white/20 shadow-[0_20px_40px_-12px_rgba(19,27,46,0.08)]">
<!-- Large Muted Icon with Glass Backing -->
<div class="relative w-24 h-24 flex items-center justify-center">
<div class="absolute inset-0 bg-primary-container/20 rounded-full blur-xl"></div>
<div class="relative w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-[48px] text-primary/40" data-icon="notifications_off">notifications_off</span>
</div>
</div>
<!-- Empty State Text Content -->
<div class="text-center space-y-2">
<h3 class="font-headline text-lg font-semibold text-on-surface">No notifications yet</h3>
<p class="font-body text-sm text-on-surface-variant leading-relaxed px-4">
                    You'll see activity from your trips here.
                </p>
</div>
<!-- Optional: Action to explore (Contextual) -->
<button class="mt-4 px-8 py-3 bg-gradient-to-br from-primary to-primary-container text-on-primary rounded-full font-label text-sm font-semibold tracking-wide shadow-lg shadow-primary/20 hover:translate-y-[-1px] active:translate-y-0 transition-all duration-300">
                Explore Trips
            </button>
</div>
<!-- Decorative Subtle Texture Map/Image -->
<div class="mt-12 w-full max-w-md rounded-lg overflow-hidden h-40 opacity-40 grayscale contrast-125 mix-blend-multiply">
<img alt="Topographic art" class="w-full h-full object-cover" data-alt="abstract topographic map lines on minimal off-white background with soft blue accents and glassy texture" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDEgCwOieB4BfZd-wbDAfCgkFufN0ujUD6tTz7vnwXuVIot3Rd3g6Dipm6a6jOaUNq5hx5O9g0DVP_nPHdUc0vZQkO2jcMOC1PZjijctJKuro1hlZZsXp_BlXFKwJb_8DGMmQmTkcm9wPd-ip-OUJp36lFOrjz9Z7_18CtMQat-YHyBEkue6iVzIYhe23SDQkFE62nQKLBi_ZEtq0m-gKEa6zkJw1YqlzDXTgh9iwQnXTHR82chMtRD7cmb-f3XW5oYo8elrga-K34"/>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-8 pb-6 pt-3 bg-white/70 dark:bg-slate-900/70 backdrop-blur-lg rounded-t-[2.5rem] shadow-[0_-10px_40px_-15px_rgba(0,0,0,0.1)]">
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-sky-500 dark:hover:text-sky-400 transition-colors translate-y-[-2px] active:translate-y-0 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="home">home</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Home</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-sky-500 dark:hover:text-sky-400 transition-colors translate-y-[-2px] active:translate-y-0 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="search">search</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Search</span>
</a>
<!-- Active State for Alerts (Notifications) -->
<a class="flex flex-col items-center justify-center bg-sky-500 text-white rounded-full w-12 h-12 mb-1 shadow-lg shadow-sky-500/40 translate-y-[-2px] active:translate-y-0 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="notifications" style="font-variation-settings: 'FILL' 1;">notifications</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-400 dark:text-slate-500 hover:text-sky-500 dark:hover:text-sky-400 transition-colors translate-y-[-2px] active:translate-y-0 transition-transform" href="#">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="font-['Inter'] text-[10px] uppercase tracking-widest font-semibold mt-1">Profile</span>
</a>
</nav>
