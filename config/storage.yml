test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# Use bin/rails credentials:edit to set the AWS secrets (as aws:access_key_id|secret_access_key)
# amazon:
#   service: S3
#   access_key_id: <%= Rails.application.credentials.dig(:aws, :access_key_id) %>
#   secret_access_key: <%= Rails.application.credentials.dig(:aws, :secret_access_key) %>
#   region: us-east-1
#   bucket: your_own_bucket-<%= Rails.env %>

# Remember not to checkin your GCS keyfile to a repository
# google:
#   service: GCS
#   project: your_project
#   credentials: <%= Rails.root.join("path/to/gcs.keyfile") %>
#   bucket: your_own_bucket-<%= Rails.env %>

# mirror:
#   service: Mirror
#   primary: local
#   mirrors: [ amazon, google, microsoft ]

seaweedfs:
  service: S3
  endpoint: <%= ENV.fetch("SEAWEEDFS_ENDPOINT", "http://localhost:8333") %>
  access_key_id: <%= ENV.fetch("SEAWEEDFS_ACCESS_KEY_ID", "any") %>
  secret_access_key: <%= ENV.fetch("SEAWEEDFS_SECRET_ACCESS_KEY", "any") %>
  bucket: <%= ENV.fetch("SEAWEEDFS_BUCKET", "catalyst") %>
  region: us-east-1
  force_path_style: true
  # Dev/test SeaweedFS sits behind the local self-signed Traefik cert;
  # only production verifies the peer (real endpoint/cert).
  ssl_verify_peer: <%= Rails.env.production? %>
