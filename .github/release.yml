# Controls the notes produced by `gh release create --generate-notes`
# (Release Rules in AGENTS.md). Dependabot / dependency-bump PRs are
# noise in phase release notes — exclude them by label and author.
changelog:
  exclude:
    labels:
      - dependencies
    authors:
      - dependabot
      - dependabot[bot]
  categories:
    - title: What's Changed
      labels:
        - "*"
