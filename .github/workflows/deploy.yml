name: Deploy

run-name: ${{ github.actor }} - DEPLOY - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip deploy]')"

    env:
      # Map your secrets to env vars Kamal expects
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      # If using Rails/other secrets:
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal -v 2.11.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Setup Local Hostname
        # This tells the runner that workeverywhere.app IS the IP.
        # This prevents the DNS "getaddrinfo" error safely.
        run: |
          sudo echo "65.20.110.89 workeverywhere.app" | sudo tee -a /etc/hosts

      - name: Add known_hosts (Securely)
        run: |
          mkdir -p ~/.ssh
          # 1. Grab all key types for the exact comma-separated string net-ssh expects
          ssh-keyscan -t rsa,ecdsa,ed25519 -H "workeverywhere.app,65.20.110.89" >> ~/.ssh/known_hosts

          # 2. Grab the raw IP just as a fallback
          ssh-keyscan -t rsa,ecdsa,ed25519 -H 65.20.110.89 >> ~/.ssh/known_hosts

      - name: Install Doppler CLI
        uses: dopplerhq/cli-action@v1

      - name: Deploy
        run: doppler run -- kamal deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
