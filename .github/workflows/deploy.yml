name: Deploy

run-name: ${{ github.actor }} - DEPLOY - ${{ github.event.head_commit.message }}

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    # Simple, case-insensitive, and actually works:
    if: >-
      (github.event_name == 'push' || github.event.pull_request.merged == true) &&
      !contains(github.event.pull_request.title || github.event.head_commit.message, '[skip deploy]')

    env:
      # Map your secrets to env vars Kamal expects
      KAMAL_REGISTRY_PASSWORD: ${{ secrets.KAMAL_REGISTRY_PASSWORD }}
      # If using Rails/other secrets:
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0.1'
          bundler-cache: true

      - name: Install Kamal
        run: gem install kamal -v 2.11.0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add known_hosts
        run: ssh-keyscan -H 65.20.110.89 >> ~/.ssh/known_hosts

      - name: Install Doppler CLI
        run: |
          curl -Ls https://get.doppler.com/install.sh | sudo sh

      - name: Deploy
        run: doppler run -- kamal deploy
        env:
          DOPPLER_TOKEN: ${{ secrets.DOPPLER_TOKEN }}
