name: CI

run-name: ${{ github.actor }} - CI - ${{ github.event.pull_request.title || github.event.head_commit.message }}

on:
  # 1. Trigger for ANY Pull Request, regardless of target branch
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'prompts/**'
      - 'ui_library/**'
      - 'PRPs/**'
      - 'docs/**'
      - 'designs/**'
      - 'notes/**'

  # 2. Trigger only when code actually lands on main (for Deploy/Final Check)
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'prompts/**'
      - 'ui_library/**'
      - 'PRPs/**'
      - 'docs/**'
      - 'designs/**'
      - 'notes/**'

env:
  RAILS_ENV: test
  RAILS_LOG_LEVEL: error

jobs:

  test:

    runs-on: ubuntu-latest

    steps:
      -
        name: Checkout Source Code
        uses: actions/checkout@v6
        with:
          fetch-depth: '1'
      -
        name: Install ruby 4.0.1
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: 4.0.1
          bundler-cache: true
      -
        name: "Lint / rubocop"
        run: |
          bundle exec rubocop --parallel --format simple
      -
        name: "Lint / erb_lint"
        run: bin/erb_lint --lint-all
      -
        name: "Security / brakeman"
        run: |
          gem install brakeman
          brakeman --exit-on-warn --no-progress --color --output /dev/stdout
      -
        name: "Security / bundle-audit"
        run: |
          gem install bundle-audit
          bundle-audit check --update -v
      -
        name: "Prepare Tests"
        run: |
          bin/rails db:environment:set RAILS_ENV=test
          bin/rails db:drop db:create db:schema:load
          bin/rails assets:precompile
      -
        name: "Test / Unit Tests (controllers, models, helpers, mailers, jobs, lib, requests)"
        run: bundle exec rspec spec --exclude-pattern "spec/system/**/*_spec.rb"
      -
        name: "Test / System Tests"
        run: TEST_BROWSER=rack_test bundle exec rspec spec/system

