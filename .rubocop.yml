inherit_from: .rubocop_todo.yml

plugins:
  - rubocop-capybara
  - rubocop-factory_bot
  - rubocop-rspec_rails
  - rubocop-rails
  - rubocop-rspec
  - rubocop-performance
  - rubocop-rails
  - rubocop-rake

inherit_mode:
  merge:
    - Include

AllCops:
  DisplayCopNames: true
  DisplayStyleGuide: true
  NewCops: enable
  Exclude:
    # ignore bin/* except for bin/setup
    - !ruby/regexp //home/joel/Workspace/Rails/templates/core\-templates/templates/root/templates/bin\/(?!setup).*/
    - .git/**/*
    - db/**/*
    - log/**/*
    - public/**/*
    - storage/**/*
    - tmp/**/*
    - vendor/**/*
    - 'spec/spec_helper.rb'
    - 'lib/templates/**/*'

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

Style/FrozenStringLiteralComment:
  Exclude:
    - config/**/*
    - spec/**/*
    - Gemfile
    - Rakefile
    - Thorfile
    - bin/**/*
    - config.ru
    - db/**/*
    - lib/tasks/**/*

Metrics/BlockLength:
  Exclude:
    - config/**/*
    - spec/**/*
    - app/components/**/*
    - app/views/**/*.rb

Metrics/ClassLength:
  Exclude:
    - spec/**/*

Metrics/MethodLength:
  Exclude:
    - db/migrate/*
    - spec/**/*
    - app/components/**/*
    - app/views/**/*.rb

Metrics/AbcSize:
  Exclude:
    - app/components/**/*
    - app/views/**/*.rb

Metrics/ModuleLength:
  Exclude:
    - config/**/*

Rails/ApplicationRecord:
  Exclude:
    - db/migrate/**

Style/Documentation:
  Enabled: false

# Phlex components don't call super in initialize
Lint/MissingSuper:
  Exclude:
    - app/components/**/*
    - app/views/**/*.rb

# Phlex uses safe() for trusted Rodauth-generated HTML (CSRF tokens)
Rails/OutputSafety:
  Exclude:
    - app/components/**/*
    - app/views/**/*.rb
